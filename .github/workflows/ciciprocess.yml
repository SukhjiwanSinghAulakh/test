name: CICD

on:
  push:
    branches:
    - main

permissions:
  id-token: write
  contents: read

jobs:

  security:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./20june26/environment/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4 
  
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init    

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: tflint
        continue-on-error: true
      
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        continue-on-error: true
    
  validate:
    needs: security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./20june26/environment/dev
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4 
  
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt

      - name: Terraform Validate
        run: terraform validate

  plan:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./20june26/environment/dev
    steps:
    - name: Checkout
      uses: actions/checkout@v4 
  
    - name: Azure login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3    
    - name: terraform init    
      run: terraform init
    - name: terraform plan  
      run: terraform plan
      
  apply:
    needs: plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./20june26/environment/dev
    steps:
    - name: Checkout
      uses: actions/checkout@v4 
  
    - name: Azure login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3     
    - name: terraform init    
      run: terraform init
    - name: terraform apply  
      run: terraform apply -auto-approve
